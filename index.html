<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>急騰ランキング</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #0a0e1a;
    color: #e0e6f0;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,14,26,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 12px 16px 10px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, #00d4ff, #7b2fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #555;
    display: inline-block;
    margin-right: 6px;
    transition: background 0.3s;
  }
  .status-dot.live { background: #00e676; box-shadow: 0 0 6px #00e676; animation: pulse 1.5s infinite; }
  .status-dot.error { background: #ff5252; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text { font-size: 11px; color: #8899aa; }

  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .tab-group {
    display: flex;
    background: rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 2px;
    gap: 2px;
  }

  .tab {
    padding: 5px 10px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: #8899aa;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    background: rgba(0,212,255,0.2);
    color: #00d4ff;
  }

  .filter-group {
    display: flex;
    background: rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 2px;
    gap: 2px;
    margin-left: auto;
  }

  .filter-btn {
    padding: 5px 8px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: #8899aa;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active {
    background: rgba(123,47,255,0.25);
    color: #a855f7;
  }

  .counter {
    font-size: 10px;
    color: #556677;
    text-align: right;
    margin-top: 4px;
  }

  .list {
    padding: 8px 12px 120px;
  }

  .coin-card {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    margin-bottom: 6px;
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    transition: background 0.15s, transform 0.15s;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .coin-card:active {
    transform: scale(0.97);
    background: rgba(255,255,255,0.09);
  }
  .tv-icon {
    flex-shrink: 0;
    margin-left: 8px;
    opacity: 0.35;
    font-size: 13px;
  }

  .coin-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 12px 0 0 12px;
  }
  .coin-card.up::before { background: #00e676; }
  .coin-card.down::before { background: #ff5252; }

  .coin-card.flash-up { animation: flashUp 0.4s ease-out; }
  .coin-card.flash-down { animation: flashDown 0.4s ease-out; }

  @keyframes flashUp {
    0% { background: rgba(0,230,118,0.2); }
    100% { background: rgba(255,255,255,0.04); }
  }
  @keyframes flashDown {
    0% { background: rgba(255,82,82,0.15); }
    100% { background: rgba(255,255,255,0.04); }
  }

  .rank {
    width: 28px;
    font-size: 13px;
    font-weight: 700;
    color: #556677;
    text-align: center;
    flex-shrink: 0;
  }
  .rank.top1 { color: #ffd700; }
  .rank.top2 { color: #c0c0c0; }
  .rank.top3 { color: #cd7f32; }

  .coin-info {
    flex: 1;
    margin: 0 10px;
    min-width: 0;
  }

  .coin-symbol {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .coin-vol {
    font-size: 10px;
    color: #556677;
    margin-top: 2px;
  }

  .coin-price-area {
    text-align: right;
    flex-shrink: 0;
  }

  .coin-price {
    font-size: 13px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.3px;
  }

  .coin-change {
    display: inline-block;
    font-size: 13px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 5px;
    margin-top: 3px;
    font-variant-numeric: tabular-nums;
  }
  .coin-change.up { background: rgba(0,230,118,0.15); color: #00e676; }
  .coin-change.down { background: rgba(255,82,82,0.12); color: #ff5252; }

  .bar-bg {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    opacity: 0.05;
    border-radius: 0 12px 12px 0;
    transition: width 0.5s ease;
  }
  .bar-bg.up { background: #00e676; }
  .bar-bg.down { background: #ff5252; }

  .empty-msg {
    text-align: center;
    color: #556677;
    padding: 60px 20px;
    font-size: 14px;
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #556677;
  }
  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(0,212,255,0.15);
    border-top-color: #00d4ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .reconnect-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(255,82,82,0.9);
    padding: 10px 16px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    display: none;
    z-index: 200;
  }
  .reconnect-bar.visible { display: block; }

  .top-summary {
    display: flex;
    gap: 8px;
    padding: 8px 12px 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .top-summary::-webkit-scrollbar { display: none; }

  .summary-chip {
    flex-shrink: 0;
    background: rgba(0,230,118,0.08);
    border: 1px solid rgba(0,230,118,0.15);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 700;
    color: #00e676;
    white-space: nowrap;
  }
  .summary-chip.down-chip {
    background: rgba(255,82,82,0.08);
    border-color: rgba(255,82,82,0.15);
    color: #ff5252;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>⚡ 急騰ランキング</h1>
    <div>
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">接続中...</span>
    </div>
  </div>
  <div class="controls">
    <div class="tab-group">
      <button class="tab active" data-mode="surge" onclick="setMode('surge')">急騰</button>
      <button class="tab" data-mode="drop" onclick="setMode('drop')">急落</button>
      <button class="tab" data-mode="all" onclick="setMode('all')">全体</button>
    </div>
    <div class="filter-group">
      <button class="filter-btn active" data-pair="USDT" onclick="setPair('USDT')">USDT</button>
      <button class="filter-btn" data-pair="BTC" onclick="setPair('BTC')">BTC</button>
      <button class="filter-btn" data-pair="ETH" onclick="setPair('ETH')">ETH</button>
    </div>
  </div>
  <div class="counter" id="counter">データ取得中...</div>
</header>

<div class="top-summary" id="topSummary"></div>

<div class="list" id="list">
  <div class="loading">
    <div class="loading-spinner"></div>
    <div>Binanceからデータ取得中...</div>
  </div>
</div>

<div class="reconnect-bar" id="reconnectBar">⚠ 接続切断 — 再接続中...</div>

<script>
const DISPLAY_COUNT = 50;
let mode = 'surge';
let pair = 'USDT';
let tickers = {};
let ws = null;
let lastRenderTime = 0;
let renderScheduled = false;
let reconnectTimer = null;
let reconnectDelay = 1000;

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));
  render();
}

function setPair(p) {
  pair = p;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.pair === p));
  render();
}

function connect() {
  if (ws) { ws.close(); ws = null; }

  // Use Binance !ticker@arr stream for all tickers
  ws = new WebSocket('wss://stream.binance.com:9443/ws/!ticker@arr');

  ws.onopen = () => {
    setStatus('live', 'LIVE');
    document.getElementById('reconnectBar').classList.remove('visible');
    reconnectDelay = 1000;
    clearTimeout(reconnectTimer);
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (!Array.isArray(data)) return;
      data.forEach(t => {
        tickers[t.s] = {
          symbol: t.s,
          price: parseFloat(t.c),
          change: parseFloat(t.P),
          vol: parseFloat(t.q), // quote volume in USDT
          volBase: parseFloat(t.v),
          high: parseFloat(t.h),
          low: parseFloat(t.l),
          count: parseInt(t.n),
        };
      });
      scheduleRender();
    } catch(err) {}
  };

  ws.onerror = () => {};

  ws.onclose = () => {
    setStatus('error', '切断');
    document.getElementById('reconnectBar').classList.add('visible');
    reconnectTimer = setTimeout(() => {
      reconnectDelay = Math.min(reconnectDelay * 1.5, 15000);
      connect();
    }, reconnectDelay);
  };
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + (state === 'live' ? 'live' : state === 'error' ? 'error' : '');
  document.getElementById('statusText').textContent = text;
}

function scheduleRender() {
  if (renderScheduled) return;
  renderScheduled = true;
  requestAnimationFrame(() => {
    renderScheduled = false;
    const now = Date.now();
    if (now - lastRenderTime >= 1000) {
      lastRenderTime = now;
      render();
    }
  });
}

// Every 1 second force render
setInterval(() => {
  if (Object.keys(tickers).length > 0) render();
}, 1000);

function formatPrice(p) {
  if (p >= 1000) return p.toLocaleString('en', {maximumFractionDigits: 2});
  if (p >= 1) return p.toFixed(4);
  if (p >= 0.001) return p.toFixed(5);
  return p.toFixed(8);
}

function formatVol(v) {
  if (v >= 1e9) return (v / 1e9).toFixed(1) + 'B';
  if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
  return v.toFixed(0);
}

function render() {
  const suffix = pair;
  let coins = Object.values(tickers).filter(t => t.symbol.endsWith(suffix));

  // Filter out stablecoins
  const stables = ['USDT','USDC','BUSD','TUSD','DAI','USDP','FDUSD','PYUSD','EURI','EUR','GBP','BRL','TRY'];
  coins = coins.filter(t => {
    const base = t.symbol.replace(suffix, '');
    return !stables.includes(base);
  });

  // Sort
  if (mode === 'surge') {
    coins.sort((a, b) => b.change - a.change);
  } else if (mode === 'drop') {
    coins.sort((a, b) => a.change - b.change);
  } else {
    coins.sort((a, b) => Math.abs(b.change) - Math.abs(a.change));
  }

  const top = coins.slice(0, DISPLAY_COUNT);
  const total = coins.length;

  // Update counter
  const now = new Date();
  const hms = now.toTimeString().slice(0,8);
  document.getElementById('counter').textContent =
    `対象 ${total} ペア | 更新 ${hms}`;

  // Top summary chips
  const summaryEl = document.getElementById('topSummary');
  const top5 = coins.slice(0, 5);
  summaryEl.innerHTML = top5.map(c => {
    const base = c.symbol.replace(suffix, '');
    const cls = c.change >= 0 ? '' : 'down-chip';
    const sign = c.change >= 0 ? '+' : '';
    return `<span class="summary-chip ${cls}">${base} ${sign}${c.change.toFixed(2)}%</span>`;
  }).join('');

  // Max abs change for bar width
  const maxChange = top.length > 0 ? Math.max(...top.map(t => Math.abs(t.change)), 1) : 1;

  // Build list
  const listEl = document.getElementById('list');

  if (top.length === 0) {
    listEl.innerHTML = '<div class="empty-msg">データなし</div>';
    return;
  }

  // Reuse existing cards to avoid full rerender (DOM diff)
  const existingCards = listEl.querySelectorAll('.coin-card');
  const existingMap = {};
  existingCards.forEach(el => { existingMap[el.dataset.symbol] = el; });

  const newOrder = [];

  top.forEach((coin, i) => {
    const base = coin.symbol.replace(suffix, '');
    const isUp = coin.change >= 0;
    const sign = isUp ? '+' : '';
    const barWidth = Math.min((Math.abs(coin.change) / maxChange) * 60, 60);
    const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';

    let card = existingMap[coin.symbol];
    if (!card) {
      card = document.createElement('div');
      card.className = 'coin-card ' + (isUp ? 'up' : 'down');
      card.dataset.symbol = coin.symbol;
      card.style.cursor = 'pointer';
      card.addEventListener('click', () => {
        const tvSymbol = 'BINANCE:' + coin.symbol;
        window.open('https://www.tradingview.com/chart/?symbol=' + tvSymbol, '_blank');
      });
    } else {
      const wasUp = card.classList.contains('up');
      const nowUp = isUp;
      if (wasUp !== nowUp) {
        card.classList.toggle('up', isUp);
        card.classList.toggle('down', !isUp);
      }
      // Flash on significant move
      const prevChange = parseFloat(card.dataset.prevChange || coin.change);
      const delta = coin.change - prevChange;
      if (Math.abs(delta) >= 0.1) {
        card.classList.remove('flash-up', 'flash-down');
        void card.offsetWidth;
        card.classList.add(delta > 0 ? 'flash-up' : 'flash-down');
      }
    }

    card.dataset.prevChange = coin.change;

    const volLabel = pair === 'USDT' ? `出来高 $${formatVol(coin.vol)}` :
      `出来高 ${formatVol(coin.volBase)} ${base}`;

    card.innerHTML = `
      <div class="bar-bg ${isUp ? 'up' : 'down'}" style="width:${barWidth}%"></div>
      <div class="rank ${rankClass}">${i + 1}</div>
      <div class="coin-info">
        <div class="coin-symbol">${base}/${suffix}</div>
        <div class="coin-vol">${volLabel}</div>
      </div>
      <div class="coin-price-area">
        <div class="coin-price">${formatPrice(coin.price)}</div>
        <div class="coin-change ${isUp ? 'up' : 'down'}">${sign}${coin.change.toFixed(2)}%</div>
      </div>
      <div class="tv-icon">📈</div>
    `;

    newOrder.push(card);
  });

  // Reorder DOM efficiently
  newOrder.forEach((card, i) => {
    if (listEl.children[i] !== card) {
      listEl.insertBefore(card, listEl.children[i] || null);
    }
  });

  // Remove extra cards
  while (listEl.children.length > newOrder.length) {
    listEl.removeChild(listEl.lastChild);
  }
}

// Handle iOS background tab reconnect
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && (!ws || ws.readyState !== WebSocket.OPEN)) {
    connect();
  }
});

connect();
</script>
</body>
</html>
